services:
  mysql:
    image: mysql:8.4
    container_name: reporamallo-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: reporamallo
      MYSQL_USER: reporamallo
      MYSQL_PASSWORD: reporamallo
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: --default-authentication-plugin=caching_sha2_password

  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: reporamallo-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: masterKey
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meili-data:/meili_data

volumes:
  mysql-data:
  meili-data:
